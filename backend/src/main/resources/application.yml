spring:
  application:
    name: merchant-onboarding-demo

  datasource:
    url: jdbc:h2:mem:merchantdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

jwt:
  secret: 1234567890123456789012345678901212345678901234567890123456789012
  expiration: 86400000

logging:
  level:
    org.springframework.security: INFO